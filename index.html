    <!-- Preload hero image: uses localStorage cache on repeat visits,
         falls back to hardcoded URL for first-visit LCP optimization.
         UPDATE the data-fallback URL when hero image changes in Admin. -->
    <script>
      (function(){
        try {
          var v = localStorage.getItem('heroVideoUrl');
          var b = localStorage.getItem('heroBgUrl');
          var url = v || b;
          // Fallback: hardcoded current hero URL for first-time visitors.
          // This eliminates the 6s resource-load-delay on first visit.
          if (!url) url = document.querySelector('meta[name="hero-preload"]')?.content;
          if (url) {
            var l = document.createElement('link');
            l.rel = 'preload';
            l.as = v ? 'video' : 'image';
            l.href = url;
            l.fetchPriority = 'high';
            l.crossOrigin = 'anonymous';
            document.head.appendChild(l);
          }
        } catch(e) {}
      })();
    </script>
